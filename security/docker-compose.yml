networks:
  homelab-network:
    external: true

services:

  # ─────────────────────────────────────────
  # Docker Socket Proxy
  # Sits between the agent container and the
  # host Docker socket. Only permits read-only
  # API calls — no container create/stop/delete.
  # ─────────────────────────────────────────
  socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: homelab-socket-proxy
    restart: unless-stopped
    environment:
      # Read-only endpoints — explicitly allowed
      CONTAINERS: 1      # GET /containers
      INFO: 1            # GET /info
      PING: 1            # GET /_ping
      VERSION: 1         # GET /version
      # Everything else defaults to 0 (denied)
      # This means no POST, DELETE, or other
      # write operations are possible through
      # this proxy regardless of what the
      # agent tries to do
      POST: 0
      DELETE: 0
      BUILD: 0
      COMMIT: 0
      CONFIGS: 0
      DISTRIBUTION: 0
      EXEC: 0
      GRPC: 0
      IMAGES: 0
      NETWORKS: 0
      NODES: 0
      PLUGINS: 0
      SECRETS: 0
      SERVICES: 0
      SESSION: 0
      SWARM: 0
      SYSTEM: 0
      TASKS: 0
      VOLUMES: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - homelab-network
    mem_limit: 64m
    privileged: true
