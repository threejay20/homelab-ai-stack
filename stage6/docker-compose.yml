networks:
  homelab-network:
    external: true

services:

  # ─────────────────────────────────────────
  # Stage 6 — AI Command Center UI
  # React frontend served via Nginx
  # Connects to Stage 5 WebSocket API
  # ─────────────────────────────────────────
  ui:
    build:
      context: ./ui
    container_name: homelab-ui
    restart: unless-stopped
    ports:
      - "3001:80"
    networks:
      - homelab-network
    mem_limit: 128m
