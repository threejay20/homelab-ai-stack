name: AI Stack Evaluation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ─────────────────────────────────────────
  # Job 1 — Verify all Docker images build
  # No LLM inference, no model downloads
  # Fast and reliable on free runners
  # ─────────────────────────────────────────
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Create Docker network
        run: docker network create homelab-network

      - name: Create env files from examples
        run: |
          cp stage1/.env.example stage1/.env
          cp stage2/.env.example stage2/.env
          cp stage2.5/.env.example stage2.5/.env

      - name: Build Stage 1 MLflow image
        working-directory: stage1
        run: docker compose build

      - name: Build Stage 2 RAG image
        working-directory: stage2
        run: docker compose build

      - name: Build Stage 2.5 Agent image
        working-directory: stage2.5
        run: docker compose build

      - name: Confirm all images built
        run: docker images | grep -E "stage1|stage2"

  # ─────────────────────────────────────────
  # Job 2 — Validate test suite syntax
  # Ensures tests are importable and structured correctly
  # Catches broken test files before they reach production
  # ─────────────────────────────────────────
  validate-tests:
    name: Validate Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install pytest httpx

      - name: Validate test collection
        working-directory: stage3
        run: |
          pytest tests/ --collect-only -q
          echo "Test collection successful — all test files are valid"

      - name: Print test summary
        working-directory: stage3
        run: |
          echo "=== Test Suite Summary ==="
          pytest tests/ --collect-only -q 2>&1 | tail -5
