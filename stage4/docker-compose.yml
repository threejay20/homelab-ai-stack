networks:
  homelab-network:
    external: true

volumes:
  prometheus_data:
  grafana_data:

services:

  # ─────────────────────────────────────────
  # Prometheus — metrics collection
  # ─────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: homelab-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - homelab-network
    mem_limit: 512m
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle

  # ─────────────────────────────────────────
  # Grafana — metrics visualization
  # ─────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: homelab-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: false
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/homelab.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    networks:
      - homelab-network
    mem_limit: 256m

  # ─────────────────────────────────────────
  # Node Exporter — host system metrics
  # CPU, memory, disk, network at OS level
  # ─────────────────────────────────────────
  node-exporter:
    image: prom/node-exporter:latest
    container_name: homelab-node-exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    ports:
      - "9100:9100"
    networks:
      - homelab-network
    mem_limit: 128m
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)

  # ─────────────────────────────────────────
  # Evidently AI — ML quality monitoring
  # Tracks RAG answer quality and drift
  # ─────────────────────────────────────────
  evidently:
    build:
      context: ./evidently
    container_name: homelab-evidently
    restart: unless-stopped
    ports:
      - "8050:8050"
    networks:
      - homelab-network
    mem_limit: 512m
    volumes:
      - ./evidently:/app
